name: "Medallia WebView Security Analysis"

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality
  
  # Custom queries for specific vulnerabilities
  - uses: ./custom-queries/WebViewFileAccess.ql
  - uses: ./custom-queries/PathTraversal.ql

query-filters:
  # Focus on high-impact WebView issues
  - include:
      id: java/android/websettings-file-access
      severity: critical
  - include:
      id: java/android/insecure-webview-settings
      severity: high
  - include:
      tags: /webview/
      severity: high
  
  # Exclude low-priority noise
  - exclude:
      id: java/trivial-eval
  - exclude:
      severity: recommendation

paths:
  - src/
  - '**/*.java'

paths-ignore:
  - '**/test/**'
  - '**/androidTest/**'
  - '**/build/**'
  - '**/*.min.js'

comment: |
  This configuration targets the MedalliaWebView vulnerability analysis.
  Focus: File access vulnerabilities in Android WebView components.